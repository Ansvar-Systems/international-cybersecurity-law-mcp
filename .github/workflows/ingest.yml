name: Ingest / Rebuild Database

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual rebuild (e.g. updated source data)'
        required: false
        default: 'Manual trigger'

jobs:
  rebuild-database:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild database
        run: npm run build:db
        env:
          NODE_ENV: production

      - name: Build TypeScript
        run: npm run build

      - name: Upload rebuilt database artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-${{ github.run_number }}
          path: data/database.db
          retention-days: 30
